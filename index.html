<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>フェーズ可変タイマー</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="header">
      <h1>フェーズ可変タイマー</h1>
      <p class="sub">
        フェーズ数・名前・分数を自由に設定 → 保存 → 開始。0秒で自動的に次へ進みます。
      </p>
    </header>

    <section class="card">
      <div class="now">
        <div class="badge" id="badge">フェーズ 1 / 1</div>
        <div class="phaseName" id="phaseName">-</div>
        <div class="time" id="timeText">00:00</div>
        <div class="next" id="nextText">次：-</div>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn">開始</button>
        <button id="pauseBtn">一時停止</button>
        <button id="resetBtn">リセット</button>
        <button id="skipBtn">次へ</button>
      </div>

      <div class="options">
        <label class="switch">
          <input type="checkbox" id="loopToggle" />
          <span>周回（最後まで行ったら最初に戻る）</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="beepToggle" checked />
          <span>フェーズ移行時にビープ音</span>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="rowTitle">
        <h2>フェーズ設定</h2>
        <div class="rowButtons">
          <button id="addPhaseBtn">＋ フェーズ追加</button>
          <button id="saveBtn">保存</button>
        </div>
      </div>

      <div class="list" id="phaseList"></div>

      <p class="hint">
        ※「保存」を押すと、設定がブラウザに保存されます（次回も同じ設定で起動）。
      </p>
    </section>

    <footer class="footer">
      <p class="muted">静的HTML/CSS/JSのみ。環境構築なしで動作します。</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
